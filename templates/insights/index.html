{% extends "base.html" %}

{% block title %}Insights — Expense Tracker{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-graph-up me-2"></i>Insights</h2>

<ul class="nav nav-tabs" id="insightsTabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="budgets-tab" data-bs-toggle="tab" data-bs-target="#budgets"
            type="button" role="tab" aria-controls="budgets" aria-selected="true">
      <i class="bi bi-pie-chart me-1"></i>Budgets
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="goals-tab" data-bs-toggle="tab" data-bs-target="#goals"
            type="button" role="tab" aria-controls="goals" aria-selected="false">
      <i class="bi bi-bullseye me-1"></i>Goals
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="recurring-tab" data-bs-toggle="tab" data-bs-target="#recurring"
            type="button" role="tab" aria-controls="recurring" aria-selected="false">
      <i class="bi bi-arrow-repeat me-1"></i>Recurring Expenses
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="trends-tab" data-bs-toggle="tab" data-bs-target="#trends"
            type="button" role="tab" aria-controls="trends" aria-selected="false">
      <i class="bi bi-bar-chart-line me-1"></i>Category Trends
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="accounts-tab" data-bs-toggle="tab" data-bs-target="#accounts-overview"
            type="button" role="tab" aria-controls="accounts-overview" aria-selected="false">
      <i class="bi bi-credit-card me-1"></i>Accounts Overview
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="forecasting-tab" data-bs-toggle="tab" data-bs-target="#forecasting"
            type="button" role="tab" aria-controls="forecasting" aria-selected="false">
      <i class="bi bi-lightning me-1"></i>Forecasting
    </button>
  </li>
</ul>

<div class="tab-content pt-4" id="insightsTabContent">
  <div class="tab-pane fade show active" id="budgets" role="tabpanel" aria-labelledby="budgets-tab">
    <p class="text-muted">Budget widgets coming in Phase 3.</p>
  </div>
  <div class="tab-pane fade" id="goals" role="tabpanel" aria-labelledby="goals-tab">
    <p class="text-muted">Coming soon.</p>
  </div>
  <div class="tab-pane fade" id="recurring" role="tabpanel" aria-labelledby="recurring-tab">
    <p class="text-muted">Coming soon.</p>
  </div>
  <div class="tab-pane fade" id="trends" role="tabpanel" aria-labelledby="trends-tab">
    <p class="text-muted">Coming soon.</p>
  </div>
  <div class="tab-pane fade" id="accounts-overview" role="tabpanel" aria-labelledby="accounts-tab">
    <p class="text-muted">Coming soon.</p>
  </div>
  <div class="tab-pane fade" id="forecasting" role="tabpanel" aria-labelledby="forecasting-tab">
    <p class="text-muted">Coming soon.</p>
  </div>
</div>
{% endblock %}
