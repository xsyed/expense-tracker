<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Expense Tracker{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 1rem;
      box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.4);
    }
    .auth-card .card-header {
      background: transparent;
      border-bottom: 1px solid rgba(0,0,0,.08);
      padding: 1.5rem 1.5rem 1rem;
    }
    .auth-brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0d6efd;
    }
  </style>
</head>
<body>
  <!-- Toast notification container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
    {% for message in messages %}
    <div class="toast align-items-center border-0 text-bg-{{ message.tags|default:'info' }}" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body fw-semibold">{{ message }}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="auth-card card">
    <div class="card-header text-center">
      <div class="auth-brand">
        <i class="bi bi-wallet2"></i> Expense Tracker
      </div>
      <h6 class="text-muted mb-0 mt-1">{% block card_title %}{% endblock %}</h6>
    </div>
    <div class="card-body p-4">
      {% block content %}{% endblock %}
    </div>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>document.querySelectorAll('.toast-container .toast').forEach(el => new bootstrap.Toast(el, { delay: 5000 }).show());</script>
</body>
</html>
