{% extends "base.html" %}

{% block title %}Home — Expense Tracker{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="mb-1">Dashboard</h2>
    <p class="text-muted mb-0">Manage your expense months</p>
  </div>
  <a href="/months/create/" class="btn btn-primary">
    <i class="bi bi-plus-circle me-1"></i>New Month
  </a>
</div>

<!-- Expense months will be listed here in Phase 3 -->
<div class="card text-center py-5">
  <div class="card-body">
    <i class="bi bi-calendar3 display-4 text-muted"></i>
    <h5 class="mt-3 text-muted">No expense months yet</h5>
    <p class="text-muted">Create your first expense month to get started.</p>
    <a href="/months/create/" class="btn btn-outline-primary mt-2">
      <i class="bi bi-plus-circle me-1"></i>Create Expense Month
    </a>
  </div>
</div>
{% endblock %}
