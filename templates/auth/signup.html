{% extends "auth_base.html" %}
{% load crispy_forms_tags %}

{% block title %}Sign Up — Expense Tracker{% endblock %}
{% block card_title %}Create your account{% endblock %}

{% block content %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<form method="post" novalidate>
  {% csrf_token %}
  {{ form|crispy }}
  <div class="cf-turnstile mb-3" data-sitekey="{{ turnstile_site_key }}"></div>
  <div class="d-grid mt-3">
    <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
  </div>
</form>
<hr>
<p class="text-center text-muted mb-0">
  Already have an account? <a href="{% url 'two_factor:login' %}">Sign in</a>
</p>
{% endblock %}
