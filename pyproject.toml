[tool.mypy]
plugins = ["mypy_django_plugin.main"]
strict = true
python_version = "3.9"
mypy_path = "."

[[tool.mypy.overrides]]
module = "*.migrations.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "core.migrations.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "manage"
ignore_errors = true

[[tool.mypy.overrides]]
module = "core.tests"
ignore_errors = true

[[tool.mypy.overrides]]
# request.user is Union[User,AnonymousUser] but @login_required guarantees User
# django-stubs cannot narrow the type through decorators — suppress affected codes
module = ["core.views", "core.views_auth", "core.views_months", "core.views_transactions", "core.views_csv", "core.views_categories", "core.views_charts", "core.views_accounts", "core.views_csv_mapper", "core.views_budgets", "core.views_insights", "core.views_goals", "core.views_category_trends", "core.views_accounts_overview", "core.views_forecasting"]
disable_error_code = ["misc", "arg-type", "assignment"]

[tool.django-stubs]
django_settings_module = "expense_month.settings"
strict_settings = true

[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C90", "B", "ANN", "DJ", "S", "N", "SIM", "PL"]
ignore = ["ANN401", "PLR0913"]

[tool.ruff.lint.per-file-ignores]
"core/tests.py" = ["ANN", "S101", "S105", "S106"]
"core/migrations/*" = ["ALL"]
"manage.py" = ["ANN", "S"]
"expense_month/wsgi.py" = ["ANN"]
"expense_month/asgi.py" = ["ANN"]
"expense_month/settings.py" = ["S105", "N802"]
"vulture_whitelist.py" = ["ALL"]
"scripts/*" = ["ANN", "T201"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 6
max-branches = 12
max-returns = 6
max-statements = 50

[tool.pylint."messages control"]
disable = "all"
enable = "R0801"

[tool.pylint.similarities]
min-similarity-lines = 6
ignore-imports = true
