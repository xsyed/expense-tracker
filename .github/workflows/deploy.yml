name: Deploy

on:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: make check

  build:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/xsyed/expense-tracker:latest,ghcr.io/xsyed/expense-tracker:${{ github.sha }}
          build-args: STATIC_VERSION=${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/sami/expense-tracker
            [ -f ./deploy/backup.sh ] && ./deploy/backup.sh "pre-deploy" || echo "Skipping pre-deploy backup (backup.sh not found, implement Phase 5)"
            docker pull ghcr.io/xsyed/expense-tracker:latest
            docker compose -f docker-compose.prod.yml up -d
            sleep 15
            curl -sf http://localhost:8000/expense-tracker/health/ || (echo "Health check failed!" && exit 1)
