# Rate limit zones — defined at http context level (this file is included inside http {})
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name scorptech.ca www.scorptech.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name scorptech.ca www.scorptech.ca;

    ssl_certificate /etc/letsencrypt/live/scorptech.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scorptech.ca/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    # Connection and buffer limits (slow loris + large payload protection)
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;
    large_client_header_buffers 2 1k;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self'; frame-src https://challenges.cloudflare.com;" always;

    # Block non-standard HTTP methods
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 405;
    }

    location = /expense-tracker/robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location ^~ /expense-tracker/static/ {
        alias /home/sami/expense-tracker/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Strict rate limiting for authentication and admin endpoints
    location ~ ^/expense-tracker/(account/login|auth/signup|admin)/ {
        rewrite ^/expense-tracker(/.*)$ $1 break;
        limit_req zone=auth burst=5 nodelay;
        limit_conn addr 5;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /expense-tracker/ {
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 20;
        client_max_body_size 5m;
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
