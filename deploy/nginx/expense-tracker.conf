server {
    listen 80;
    server_name scorptech.ca www.scorptech.ca;
    # Certbot will modify this block to add SSL redirect

    location /expense-tracker/static/ {
        alias /home/sami/expense-tracker/staticfiles/;
        # Cache-busting via Django VersionedStaticFilesStorage: every static URL includes
        # ?v=<STATIC_VERSION> (git SHA injected at build time), so each deploy produces
        # new URLs — immutable + long TTL is safe; stale assets are never served.
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /expense-tracker/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root domain — placeholder for future services
    location / {
        return 404;
    }
}
